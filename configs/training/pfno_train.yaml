# @package _global_
# Probabilistic FNO-3D
training:
  experiment_name: "pfno_3d"
  seed: 42

  data:
    data_path: "data/playback_data/global_source_400_100_2nd.npz"
    batch_size: 32
    train_split: 0.9
    max_samples: null
    sequence_length: 32
    num_workers: 0

  model:
    h_ctx:  5
    m_pred:  5

    modes_t:  4   
    modes_h:  8   
    modes_w:  8   

    width:    32  
    n_layers:  4  

    use_grid:  true   
    use_time:  true   
    min_std:   1.0e-4
    
  loss:
    beta: 0.5

  optimizer:
    lr: 1.0e-3
    min_lr: 1.0e-4
    max_epochs: 60
    grad_clip: 1.0

  scheduler:
    # Used for uncertainty rollout curriculum (e.g. 1 -> h_pred)
    horizon_start_step: 1
    horizon_end_step: 4
    epochs: 40 # How many epochs it takes to reach full horizon

  checkpoint:
    save_top_k: 3
    monitor: "val_nll"
    mode: "min"

  visualizer:
    visualize_every: 1
