# @package _global_
# ConvLSTM Baseline
training:
  experiment_name: "conv_lstm"
  seed: 42

  data:
    data_path: "data/playback_data/global_source_400_100_2nd.npz"
    batch_size: 32
    train_split: 0.9
    max_samples: null
    sequence_length: 30    # > h_ctx + h_pred  (10 + 5 = 15 → 30 works)
    num_workers: 0

  model:
    h_ctx:  5    # Context frames  (T dimension)
    h_pred:  5    # Future frames per forward pass  (autoregressive in inference)

    hidden_dim: 32
    n_layers: 3
    kernel_size: 5

    use_grid:  true   # Append (x,y) spatial grid after temporal aggregation
    use_time:  true   # Append normalised time as extra input channel per frame
    min_std:   1.0e-4

  optimizer:
    lr: 1.0e-3
    min_lr: 1.0e-4
    max_epochs: 250
    grad_clip: 1.0

  checkpoint:
    save_top_k: 3
    monitor: "val_nll"
    mode: "min"

  visualizer:
    visualize_every: 10
